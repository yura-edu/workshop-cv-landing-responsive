# yura.workshop.yaml — declarative grader config
# Spec: docs/grader-workers-spec.md §6
# Generated from prisma/seeds/workshop-templates.seed.ts

schema_version: "1.0"
workshop:
  id: cv-landing-responsive
  title: "Landing page responsive HTML5/CSS"
  type: code_quality
  language: typescript
  passing_threshold: 70
  base_branch: main
submission:
  source: workshop_link
  required_inputs:
    - type: github_repo_url
      label: "URL del repositorio"
      required: true
evaluation_profile:
  - metric_id: lighthouse_performance_score
    weight: 20
    threshold: 0.9
    config:
      min_score: 0.9
      category: performance
  - metric_id: lighthouse_accessibility_score
    weight: 25
    threshold: 0.9
    config:
      min_score: 0.9
      category: accessibility
  - metric_id: lighthouse_best_practices_score
    weight: 15
    threshold: 0.9
    config:
      min_score: 0.9
      category: best-practices
  - metric_id: responsive_breakpoint_count
    weight: 15
    threshold: 3
    config:
      min_count: 3
  - metric_id: html_validation_errors_count
    weight: 15
    threshold: 0
    config:
      tool: html-validate
      max_errors: 0
  - metric_id: css_validation_errors_count
    weight: 10
    threshold: 0
    config:
      tool: stylelint
      max_errors: 0
